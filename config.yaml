#=================================#
# config.yaml - VCF to Phyolgeny
# IFB cluster
#=================================#

# path 
vcf : "input/data_test/vcf_test.vcf.gz"
genome : "input/data_test/Genome_test.fasta"
fai : "input/data_test/Genome_test.fasta.fai"
bed_file : "input/data_test/Busco.bed" # bed file with 4 columns (chr, start, end, names)
results: "results"

samples_list: ["SRR35414640", "SRR35414647", "C47R1", "20_Q_A_S19", "MNC_C2_W2", "C135R1", "C15R1", "C180R12", "C181R6", "22_Q_A_S21", "C52R1", "C73R1", "5_SIC", "6_SIC", "ES034", "ES051", "ATL_C1_W1", "ES19A027W1", "ES20A113W1", "ES219", "CHI_C1_W2", "ATL_C2_W1", "CHI_C3_W1", "CHI_C5_W2", "CHI_C8_W1", "CHI_C6_P2", "CHI_C6_W1", "CHI_C7_W2", "CHI_C4_W1", "3_1", "LH3_R1", "15_1", "33_4", "LH4_R1", "21_1", "8_1", "2022_9_7W1", "2022_9_4W1", "23_2"]

mapping_file: "input/data_test/mapping_file"

# vfc filtering :
filter : false # or true 
DP_min : 10 # min depth to keep a position in the consensus sequence (if not, it will be replaced by N)
DP_max : 150 # max depth to keep a position in the consensus sequence (if not, it will be replaced by N)
BaseQual : 30 # min base quality to keep a position in the consensus sequence (if not, it will be replaced by N)
Na_rate : 0.5

# Consensus sequences parameters :

# method to compute consensus sequence
#    1 the first allele, regardless of phasing
#    2 the second allele, regardless of phasing
#    R the REF allele (in heterozygous genotypes)
#    A the ALT allele (in heterozygous genotypes)
#    I IUPAC code for all genotypes

haplotype : "I"

# Sequences filtering :
max_na:       20     # % missing max by seq
min_taxa:     95     # % min of sample that shared the séquence after filtering (if 100% , seq are common to all sample)

# Hyper parameters
minperc_sample_by_seq :  95.0 # After N % filtering, the seq should be present in x % of the sample to be kept further
